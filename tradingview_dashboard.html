<style>

h1 { color:#fff; font-size:18px; margin-bottom:12px; }
h2 { color:#888; font-size:13px; margin:20px 0 8px 8px; text-transform:uppercase; letter-spacing:1px; }
.grid-3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; }
.grid-2 { display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; }
.widget-container { background:#131722; border-radius:8px; overflow:hidden; border:1px solid #2a2e39; }
.widget-container iframe { width:100%; height:320px; border:none; }
.subtitle { color:#666; font-size:11px; margin-top:6px; text-align:center; }
.badge { display:inline-block; background:#2a2e39; color:#888; padding:2px 8px; border-radius:4px; font-size:10px; margin-bottom:8px; }
</style>
